<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WhatsApp Archive Viewer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Archive controls">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">WA</div>
          <div>
            <h1>Archive Viewer</h1>
            <p id="archiveMeta">No archive loaded</p>
          </div>
        </div>

        <section class="panel import-panel" aria-label="Import">
          <h2>Import</h2>
          <label class="file-picker">
            <span>Chat file</span>
            <input id="chatFile" type="file" accept=".txt,text/plain">
          </label>
          <label class="file-picker">
            <span>Media folder</span>
            <input id="mediaFiles" type="file" webkitdirectory directory multiple>
          </label>
          <button id="importButton" class="primary-action" type="button">
            <span aria-hidden="true">+</span>
            Build archive
          </button>
          <p id="importStatus" class="status-line" role="status"></p>
        </section>

        <section class="panel archive-panel" aria-label="Saved archives">
          <div class="section-heading">
            <h2>Archives</h2>
            <button id="refreshArchives" class="icon-button" type="button" title="Refresh archives" aria-label="Refresh archives">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.3-5.6"/><path d="M20 4v6h-6"/></svg>
            </button>
          </div>
          <div id="archiveList" class="archive-list"></div>
        </section>

        <section class="panel stats-panel" aria-label="Archive stats">
          <h2>Summary</h2>
          <dl class="stats-grid">
            <div><dt>Messages</dt><dd id="statMessages">0</dd></div>
            <div><dt>Media</dt><dd id="statMedia">0</dd></div>
            <div><dt>Senders</dt><dd id="statSenders">0</dd></div>
            <div><dt>Links</dt><dd id="statLinks">0</dd></div>
          </dl>
        </section>

        <section class="panel identity-panel" aria-label="Sender aliases">
          <div class="section-heading">
            <h2>People</h2>
            <button id="saveAliases" class="icon-button" type="button" title="Save aliases" aria-label="Save aliases">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
            </button>
          </div>
          <input id="aliasSearch" class="panel-search" type="search" placeholder="Find sender">
          <div id="aliasList" class="alias-list"></div>
        </section>

        <section class="panel links-panel" aria-label="Shared links">
          <h2>Links</h2>
          <div id="linkList" class="link-list"></div>
        </section>

        <section class="panel insights-panel" aria-label="Archive insights">
          <h2>Insights</h2>
          <div id="insightList" class="insight-list"></div>
        </section>
      </aside>

      <main class="chat-pane">
        <header class="chat-header">
          <div>
            <h2 id="chatTitle">WhatsApp Export</h2>
            <p id="chatSubtitle">Import a chat export to begin</p>
          </div>
          <div class="toolbar" role="search">
            <label class="search-box">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
              <input id="searchInput" type="search" placeholder="Search">
            </label>
            <select id="senderFilter" aria-label="Sender filter">
              <option value="">All senders</option>
            </select>
            <select id="typeFilter" aria-label="Type filter">
              <option value="">All types</option>
              <option value="text">Text</option>
              <option value="link">Links</option>
              <option value="image">Images</option>
              <option value="video">Videos</option>
              <option value="audio">Audio</option>
              <option value="document">Documents</option>
              <option value="bookmarked">Bookmarked</option>
              <option value="missing">Missing media</option>
              <option value="system">System</option>
            </select>
            <input id="dateJump" type="date" aria-label="Jump to date">
          </div>
        </header>

        <div id="resultBar" class="result-bar">No messages</div>
        <section id="messageList" class="message-list" aria-label="Messages">
          <div class="empty-state">
            <h2>No archive loaded</h2>
            <p>Select an exported chat file and its media folder from the sidebar.</p>
          </div>
        </section>
      </main>
    </div>

    <template id="messageTemplate">
      <article class="message-row">
        <div class="message-bubble">
          <div class="message-sender"></div>
          <div class="message-media"></div>
          <div class="message-text"></div>
          <div class="message-footer">
            <button class="bookmark-button" type="button" title="Bookmark message" aria-label="Bookmark message">☆</button>
            <span class="message-type"></span>
            <time></time>
          </div>
          <details class="message-notes">
            <summary>Notes</summary>
            <label>
              <span>Note</span>
              <textarea class="note-input" rows="2"></textarea>
            </label>
            <label>
              <span>Tags</span>
              <input class="tag-input" type="text" placeholder="chart-analysis, risk">
            </label>
          </details>
        </div>
      </article>
    </template>

    <script src="parser.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
